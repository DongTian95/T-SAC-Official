---
name: "SLURM"
partition: "cpuonly"
job-name: "metaworld_tsac_entire_sparse"
num_parallel_jobs: 0
ntasks: 1
cpus-per-task: 152
time: 1499
cpus_per_rep: 152
scheduler: cpu_distribute

experiment_copy_src:
  - "../" # RL Code base
#  - "../../fancy_gymnasium/" # fancy_gym
experiment_copy_auto_dst: "../../CODE_COPY/"
---
name: metaworld_tsac_entire_sparse
import_path: "./shared.yaml"
import_exp: "metaworld_tsac_entire_sparse"

# cw2 config
repetitions: 2      # Number of repetitions, each with different random seed, 4 for test, 20 for paper
reps_per_job: 1
reps_in_parallel: 1
iterations: &iterations 10000
num_checkpoints: 1

# Hardware specific parameters
params:
  sampler:
    args:
      num_env_train: 4
      num_env_test: 152
      episodes_per_train_env: 1
      episodes_per_test_env: 1
  projection:
    args:
      total_train_steps: *iterations

