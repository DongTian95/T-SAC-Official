# Global config
exp_name: &exp_name "gym_mujoco_tsac"
exp_path: &exp_path "../mprl_exp_result"
sub_exp_name: &sub_exp_name "[ICLR Rebuttal: Official test] soft copy"
act_func_hidden: &act_func_hidden relu
act_func_last: &act_func_last null
dtype: &dtype "float32"
device: &device "cuda"
seed: 3   # auto means starting from 0, int means starting from this number
add_timestamp: &add_timestamp false   # option: only_state, only_action, true, false

# cw2 config
name: *exp_name
path: *exp_path

# wandb
wandb:
  project: *exp_name
  group: *sub_exp_name
  entity: dt_team
  log_interval: &log_interval 100
  log_model: true
  model_name: model
  comment: development on going (maybe)

# experiment parameters
params:
  agent:
    type: RLACMultiProcessing
    args:
      lr_policy: 3.0e-4
      lr_critic: 3.0e-4   # suggest to use 2.5e-5
      wd_policy: 1.0e-5
      wd_critic: 1.0e-5       # seems alright
      betas: (0.9, 0.999) # default betas
      policy_betas: (0.9, 0.999)
      critic_betas: (0.5, 0.95)
      total_iterations: 10000   # this is to control schedule_lr
      schedule_lr_policy: false
      schedule_lr_critic: false
      clip_critic: 0.0
      clip_grad_norm: 1.0
      separate_policy_entropy_training: false  # number means update interval
      separate_mean_variance_optimizer: 0.0   # number means variance net lr scaling ratio, such as 0.1
      use_automatic_entropy_tuning: true
      entropy_penalty_coef: -5.0   # when use_automatic_entropy_tuning is true, this means the initial value
      target_entropy: default    # option: default or (A) * action_dim (give in A, normally negative)
      discount_factor: 0.99
      batch_size: &batch_size 256
      critic_warmup_step: 0
      policy_warmup_step: 250
      update_way: mp  # option: original_sac, mp
      training_times: 3 # 3 seems better
      segments_num: 1
      policy_delay: 0
      random_critic_index_number: 20  # has bug, the real number is (A) - min_length
      random_policy_index_number: 4 # number means how many policies will be updated, list means upper and lower bound of interval
      random_target: false
      use_done_for_target: &use_done_for_target false
      critic_train_in_order: false  # option: segment, segment_uniform, true, false, top_erl_segment(not ready)
      punish_deviation: # by default leave it empty, if not empty, it should be a non-negative number
      reset_critic_network:    # should be a list or blank
      reset_policy_network:   # should be a list or blank
      continue_policy_training:   # should have a number if reset_critic_network is not empty
      target_update_interval: 1
      policy_polyak_average_factor: 0.0
      use_trust_region_update: false
      use_last_three_as_policy_target: false
      set_variance: false
      huber_beta:
      add_timestamp: *add_timestamp
      balance_check: *log_interval
      evaluation_interval: *log_interval
      dtype: *dtype
      device: *device

  policy:
    type: RLACPolicy
    args:
      mean_net_args:
        layer_norm: true
        avg_neuron: 256
        num_hidden: 2
        shape: 0.0
      variance_net_args:
        std_only: true
        contextual: true
        layer_norm: true
        avg_neuron: 256
        num_hidden: 2
        shape: 0.0
      policy_step_length: 1
      init_method: fan_in
      out_layer_gain: 0.01
      min_std: 1e-5
      log_min_std: -20
      feed_mean_to_variance: false
      act_func_hidden: *act_func_hidden
      act_func_last: *act_func_last
      dtype: *dtype
      device: *device

  critic:
    type: TransformerSACCritic
    args:
      net_args:
        block_size: 1024
        n_layer: 2
        n_head: 4
        n_embd: 256
        dropout: 0.0
        bias: false
        use_layer_norm: true
      update_rate: 1.0    # used for polyak averaging
      out_layer_gain: 1
      act_func_last: *act_func_last
      dtype: *dtype
      device: *device

  sampler:
    type: RLACSampler
    args:
      env_id: "Walker2d-v4"
      episodes_per_train_env: 1
      episodes_per_test_env: 1
      norm_step_obs: false
      use_done_for_target: *use_done_for_target
      reward_scaling: 1.0
      min_length: 1
      step_length: 16
      max_length: 20
      action_range: 1.0
      padding_on: true
      cut_segment: 1  #if no cutting, please write 1 (0 has bug, ddl is approaching, no time to fix XP)
      reset_at_beginning: true
      add_timestamp: *add_timestamp
      dtype: *dtype
      device: *device
      seed: auto

  replay_buffer: # Only for off-policy
    type: TransformerSACReplayBuffer
    args:
      buffer_size: 1000000
      prb_reward_scaling: 0.0   # 0.0 means no prioritized sampling
      batch_size: *batch_size
      device: *device
      dtype: *dtype
