# cw2 config
name: debug on going
import_path: "./shared.yaml"
import_exp: "box_random_tsac_entire"

repetitions: 1
reps_per_job: 1
reps_in_parallel: 1
iterations: &iterations 10000
num_checkpoints: 1

# Hardware specific parameters
params:
  agent:
    args:
      evaluation_interval: 100
#      policy_warmup_step: 0
  sampler:
    args:
      num_env_train: 4
      num_env_test: 4
      episodes_per_train_env: 1
      episodes_per_test_env: 5
  projection:
    args:
      total_train_steps: *iterations