# cw2 config
name: debug on going
import_path: "./shared.yaml"
import_exp: "metaworld_tsac_final_version"

repetitions: 1
reps_per_job: 1
reps_in_parallel: 1
iterations: &iterations 20000
num_checkpoints: 1

# Hardware specific parameters
params:
  agent:
    args:
      batch_size: &batch_size 512
      evaluation_interval: 100
      policy_warmup_step: 0
  sampler:
    args:
      num_env_train: 4
      num_env_test: 4
      episodes_per_train_env: 1
      episodes_per_test_env: 1
  replay_buffer: # Only for off-policy
    args:
      buffer_size: 5000  # Each sample is quite large, so we can't afford a big buffer
      batch_size: *batch_size
  projection:
    args:
      total_train_steps: *iterations