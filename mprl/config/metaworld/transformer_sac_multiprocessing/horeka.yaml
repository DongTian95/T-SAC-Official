---
name: "SLURM"
partition: "accelerated"
job-name: "metaworld_tsac"
num_parallel_jobs: 120
ntasks: 1
cpus-per-task: 152
time: 1199
gpus_per_rep: 1
scheduler: horeka
sbatch_args:
  gres: "gpu:4"
  account: "hk-project-p0022232"
  exclude: "hkn0632"
  
experiment_copy_src:
  - "../" # RL Code base
#  - "../../fancy_gymnasium/" # fancy_gym
experiment_copy_auto_dst: "../../CODE_COPY/"
---
name: metaworld_tsac
import_path: "./shared.yaml"
import_exp: "metaworld_tsac"

# cw2 config
repetitions: 8      # Number of repetitions, each with different random seed, 4 for test, 20 for paper
reps_per_job: 4
reps_in_parallel: 4
iterations: &iterations 10000
num_checkpoints: 1

# Hardware specific parameters
params:
  sampler:
    args:
      num_env_train: 4
      num_env_test: 38
      episodes_per_train_env: 1
      episodes_per_test_env: 4
  projection:
    args:
      total_train_steps: *iterations

grid:
  sampler:
    args:
      env_id: [
         "metaworld/assembly-v2",    
         "metaworld/basketball-v2",
         "metaworld/bin-picking-v2",
