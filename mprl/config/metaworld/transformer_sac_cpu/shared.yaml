# Global config
exp_name: &exp_name "metaworld_tsac_entire_sparse"
exp_path: &exp_path "../mprl_exp_result"
sub_exp_name: &sub_exp_name "verify the impact of different n_head"
act_func_hidden: &act_func_hidden leaky_relu
act_func_last: &act_func_last null
dtype: &dtype "float32"
device: &device "cpu"
seed: auto
add_timestamp: &add_timestamp true
cpus_per_rep: 152

# cw2 config
name: *exp_name
path: *exp_path

# wandb
wandb:
  project: *exp_name
  group: *sub_exp_name
  entity: dt_team
  log_interval: &log_interval 100
  log_model: true
  model_name: model
  comment: development on going

# experiment parameters
params:
  agent:
    type: TransformerSAC
    args:
      lr_policy: 1e-3
      lr_critic: 3e-5
      wd_policy: 1e-5
      wd_critic: 1e-5
      betas: (0.9, 0.999)
      schedule_lr_policy: true
      schedule_lr_critic: true
      clip_critic: 0.0
      clip_grad_norm: 0.0
      entropy_penalty_coef: 0.0
      discount_factor: &discount_factor 0.99
      batch_size: &batch_size 256
      critic_warmup_step: 0
      policy_warmup_step: 1000
      training_times_critic: 1  # 3 seems better
      training_times_policy: 1
      random_critic_index_number: 100
      random_policy_index_number: 20    # how many states of one policy step will be updated
      random_target: true
      use_done_for_target: true
      target_update_interval: 50
      add_timestamp: *add_timestamp
      balance_check: *log_interval
      evaluation_interval: *log_interval
      dtype: *dtype
      device: *device

  policy:
    type: TransformerSACPolicy
    args:
      mean_net_args:
        avg_neuron: 128
        num_hidden: 2
        shape: 0.0
      variance_net_args:
        std_only: false
        contextual: true
        avg_neuron: 128
        num_hidden: 2
        shape: 0.0
      init_method: orthogonal
      out_layer_gain: 0.01
      min_std: 1e-5
      act_func_hidden: *act_func_hidden
      act_func_last: *act_func_last
      dtype: *dtype
      device: *device

  critic:
    type: TransformerSACCritic
    args:
      net_args:
        block_size: 1024
        n_layer: 2
        n_head: 1
        n_embd: 128
        dropout: 0.0
        bias: false
        use_layer_norm: true
      update_rate: 5.0e-2   # used for polyak averaging
      out_layer_gain: 1
      act_func_last: *act_func_last
      dtype: *dtype
      device: *device

  projection:
    type: KLProjectionLayer
    args:
      proj_type: kl
      mean_bound: 0.005
      cov_bound: 0.005
      trust_region_coeff: 0.25
      scale_prec: true
      entropy_schedule: false  # Desired value is linear or exp or null
      target_entropy: -1 # target entropy per action dim
      temperature: 0.7
      entropy_eq: false # If the entropy should follow an equality constraint
      entropy_first: false # If the entropy should be the first constraint
      do_regression: false
      dtype: *dtype
      device: *device

  sampler:
    type: TransformerSACSampler
    args:
      env_id: "metaworld/hammer-v2"
      episodes_per_train_env: 1
      episodes_per_test_env: 1
      norm_step_obs: false
      reward_scaling: 1.0
      step_length: 4
      action_range: 1.0
      padding_on: false
      add_timestamp: *add_timestamp
      dtype: *dtype
      device: *device
      seed: auto
      task_specified_metrics: ["success",
                               "near_object",
                               "grasp_success",
                               "grasp_reward",
                               "in_place_reward",
                               "obj_to_target",
                               "unscaled_reward",
      ]

  replay_buffer: # Only for off-policy
    type: TransformerSACReplayBuffer
    args:
      buffer_size: 20000  # Each sample is quite large, so we can't afford a big buffer
      prb_reward_scaling: 0.0001
      batch_size: *batch_size
      device: *device
      dtype: *dtype
