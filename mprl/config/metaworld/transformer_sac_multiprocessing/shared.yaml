# Global config
exp_name: &exp_name "metaworld_tsac_final_version"
exp_path: &exp_path "../mprl_exp_result"
sub_exp_name: &sub_exp_name "verify whetherthe program is still right"
act_func_hidden: &act_func_hidden leaky_relu
act_func_last: &act_func_last null
dtype: &dtype "float32"
device: &device "cuda"
seed: auto
add_timestamp: &add_timestamp false   # option: only_state, only_action, true, false

# cw2 config
name: *exp_name
path: *exp_path

# wandb
wandb:
  project: *exp_name
  group: *sub_exp_name
  entity: dt_team
  log_interval: &log_interval 100
  log_model: true
  model_name: model
  comment: development on going (maybe)

# experiment parameters
params:
  agent:
    type: TransformerSACMultiProcessing
    args:
      lr_policy: 2.5e-4
      lr_critic: 2.5e-5
      wd_policy: 1e-5
      wd_critic: 1e-5       # seems alright
      betas: (0.9, 0.999)
      total_iterations: 100000   # this is to control schedule_lr
      schedule_lr_policy: false
      schedule_lr_critic: false
      clip_critic: 0.0
      clip_grad_norm: 0.0
      separate_policy_entropy_training: false  # number means update interval
      separate_mean_variance_optimizer: false   # number means variance net lr scaling ratio, such as 0.1
      use_automatic_entropy_tuning: true
      entropy_penalty_coef: 0.0   # when use_automatic_entropy_tuning is true, this means the initial value
      target_entropy: default   # suggest to use default
      discount_factor: &discount_factor 0.99
      batch_size: &batch_size 512
      critic_warmup_step: 0
      policy_warmup_step: 200
      update_way: mp  # option: original_sac, mp
      training_times: 5  # 3 seems better
      segments_num: 1
      policy_delay: 0
      random_critic_index_number: 100
      random_policy_index_number: 20 # number means how many policies will be updated, list means upper and lower bound of interval
      random_target: true
      use_done_for_target: false
      critic_train_in_order: false  # option: segment, segment_uniform, true, false, top_erl_segment(not ready)
      punish_deviation: # by default leave it empty, if not empty, it should be a non-negative number
      reset_critic_network:    # should be a list or blank
      reset_policy_network:   # should be a list or blank
      continue_policy_training:   # should have a number if reset_critic_network is not empty
      target_update_interval: 0
      policy_polyak_average_factor: 0.0
      use_trust_region_update: false
      use_last_three_as_policy_target: false
      set_variance: false
      add_timestamp: *add_timestamp
      balance_check: *log_interval
      evaluation_interval: *log_interval
      dtype: *dtype
      device: *device

  policy:
    type: TransformerSACPolicy
    args:
      mean_net_args:
        layer_norm: true
        avg_neuron: 128
        num_hidden: 2
        shape: 0.0
      variance_net_args:
        std_only: true
        contextual: true
        layer_norm: true
        avg_neuron: 128
        num_hidden: 2
        shape: 0.0
      init_method: fan_in
      out_layer_gain: 0.01
      min_std: 1e-5
      log_min_std: -20
      feed_mean_to_variance: true
      act_func_hidden: *act_func_hidden
      act_func_last: *act_func_last
      dtype: *dtype
      device: *device

  critic:
    type: TransformerSACCritic
    args:
      net_args:
        block_size: 1024
        n_layer: 2
        n_head: 4
        n_embd: 128
        dropout: 0.0
        bias: false
        use_layer_norm: true
      update_rate: 5.0e-3   # used for polyak averaging
      out_layer_gain: 1
      act_func_last: *act_func_last
      dtype: *dtype
      device: *device

  projection:
    type: KLProjectionLayer
    args:
      proj_type: kl
      mean_bound: 0.1
      cov_bound: 0.0005
      trust_region_coeff: 10.0
      scale_prec: true
      entropy_schedule: false  # Desired value is linear or exp or null
      target_entropy: 0.0 # target entropy per action dim
      temperature: 0.7
      entropy_eq: false # If the entropy should follow an equality constraint
      entropy_first: false  # If the entropy should be the first constraint
      do_regression: false
      dtype: *dtype
      device: *device

  sampler:
    type: TransformerSACSampler
    args:
      env_id: "metaworld/button-press-topdown-v2"
      episodes_per_train_env: 1
      episodes_per_test_env: 1
      norm_step_obs: false
      reward_scaling: 1.0
      min_length: 1
      step_length: 8
      max_length: 500
      action_range: 1.0
      padding_on: false
      add_timestamp: *add_timestamp
      dtype: *dtype
      device: *device
      seed: auto
      task_specified_metrics: ["success",
#                               "near_object",
#                               "grasp_success",
#                               "grasp_reward",
#                               "in_place_reward",
#                               "obj_to_target",
                               "unscaled_reward",
      ]

  replay_buffer: # Only for off-policy
    type: TransformerSACReplayBuffer
    args:
      buffer_size: 5000  # Each sample is quite large, so we can't afford a big buffer
      prb_reward_scaling: 0.0   # 0.0 means no prioritized sampling
      batch_size: *batch_size
      device: *device
      dtype: *dtype
